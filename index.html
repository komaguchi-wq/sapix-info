<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>SAPIX情報</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, sans-serif;
  background: #f5f5f5;
  overflow: hidden;
  height: 100dvh;
}
.header {
  background: #2c3e50;
  color: white;
  text-align: center;
  padding: 10px;
  font-size: 18px;
  font-weight: bold;
}
.slider {
  display: flex;
  transition: transform 0.3s ease;
  height: calc(100dvh - 70px);
  touch-action: pan-y pinch-zoom;
}
.slide {
  min-width: 100vw;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  justify-content: center;
  padding: 8px;
}
.slide img {
  width: 100%;
  height: auto;
  object-fit: contain;
}
.nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  padding: 8px;
  background: #fff;
  border-top: 1px solid #ddd;
}
.arrow {
  width: 36px;
  height: 36px;
  border: none;
  background: #2c3e50;
  color: white;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.arrow:disabled {
  background: #ccc;
}
.dots {
  display: flex;
  gap: 10px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ccc;
  transition: background 0.3s;
}
.dot.active {
  background: #2c3e50;
}
</style>
</head>
<body>
<div class="header">SAPIX情報</div>
<div class="slider" id="slider">
  <div class="slide"><img src="images/schedule_p1.png" alt="前期スケジュール"></div>
  <div class="slide"><img src="images/schedule_p3.png" alt="テスト・講習情報"></div>
</div>
<div class="nav">
  <button class="arrow" id="prev" disabled>&#9664;</button>
  <div class="dots" id="dots">
    <div class="dot active" data-index="0"></div>
    <div class="dot" data-index="1"></div>
  </div>
  <button class="arrow" id="next">&#9654;</button>
</div>

<script>
const slider = document.getElementById('slider');
const dots = document.querySelectorAll('.dot');
let current = 0;
const total = 2;
let startX = 0;
let diffX = 0;
let dragging = false;

const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

function goTo(i) {
  current = Math.max(0, Math.min(i, total - 1));
  slider.style.transform = `translateX(-${current * 100}vw)`;
  dots.forEach((d, idx) => d.classList.toggle('active', idx === current));
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === total - 1;
}

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

slider.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
  diffX = 0;
  dragging = true;
  slider.style.transition = 'none';
});

slider.addEventListener('touchmove', e => {
  if (!dragging) return;
  diffX = e.touches[0].clientX - startX;
  slider.style.transform = `translateX(calc(-${current * 100}vw + ${diffX}px))`;
});

slider.addEventListener('touchend', () => {
  dragging = false;
  slider.style.transition = 'transform 0.3s ease';
  if (diffX > 50) goTo(current - 1);
  else if (diffX < -50) goTo(current + 1);
  else goTo(current);
});

dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.index)));
</script>
</body>
</html>
